spring:
  datasource:
    url: jdbc:sqlite:${DB_PATH:/app/data/debuglog.db}
    driver-class-name: org.sqlite.JDBC
  jpa:
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    properties:
      hibernate:
        type:
          preferred_long_jdbc_type: INTEGER
          preferred_boolean_jdbc_type: INTEGER
  flyway:
    enabled: true
    locations: classpath:db/migration
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        model: ${OLLAMA_MODEL:qwen2.5-coder:7b}
        options:
          temperature: 0.2
          num-predict: 1024

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never